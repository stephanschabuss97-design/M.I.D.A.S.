name: Incidents Push

on:
  schedule:
    # GitHub Actions cron ist UTC.
    # Die Edge Function entscheidet fachlich in Europe/Vienna.
    #
    # Zwei versetzte Ticks pro relevanter UTC-Stunde:
    # - robuster gegen GitHub-Scheduler-Jitter als ein einzelner :05-Tick
    # - deutlich weniger Runs als ein 24/7-30-Minuten-Dauerlauf
    #
    # Stunden decken CET/CEST fuer die produktiven MIDAS-Schwellen ab:
    # Medication:
    # - morning: reminder 10:00, incident 12:00 lokal
    # - noon: reminder 14:00, incident 16:00 lokal
    # - evening: reminder 20:00, incident 22:00 lokal
    # - night: reminder 22:30, incident 23:30 lokal
    # BP:
    # - evening incident ab 20:00 lokal
    #
    # Minuten bewusst nicht :00/:05:
    # :17 = erster robuster Tick nach Schwelle
    # :37 = Backup-Tick innerhalb derselben Stunde
    - cron: "17,37 8,9,10,11,12,13,14,15,18,19,20,21,22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Manual run mode"
        required: false
        default: "incidents"
        type: choice
        options:
          - incidents
          - diagnostic
      window:
        description: "Manual test window"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - med
          - bp

jobs:
  incidents-push:
    runs-on: ubuntu-latest
    steps:
      - name: Call Incidents Edge Function
        run: |
          set -euo pipefail

          MODE_INPUT="${{ github.event.inputs.mode || 'incidents' }}"
          WINDOW_INPUT="${{ github.event.inputs.window || 'all' }}"
          TRIGGER="scheduler"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER="manual"
          fi

          if [ "$MODE_INPUT" = "diagnostic" ]; then
            MODE="diagnostic"
          else
            MODE="incidents"
          fi

          if [ -n "$WINDOW_INPUT" ]; then
            WINDOW="$WINDOW_INPUT"
          else
            WINDOW="all"
          fi

          curl --fail-with-body -sS -X POST "${{ secrets.INCIDENTS_PUSH_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -d "{\"trigger\":\"$TRIGGER\",\"mode\":\"$MODE\",\"window\":\"$WINDOW\"}"
