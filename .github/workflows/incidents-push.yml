name: Incidents Push

on:
  schedule:
    # Regelmaessiger Tick; die eigentliche Reminder-/Incident-Entscheidung lebt in der Edge Function
    # und wird dort in Europe/Vienna ausgewertet.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      window:
        description: "Optional: med | bp | all"
        required: false
        default: ""

jobs:
  incidents-push:
    runs-on: ubuntu-latest
    steps:
      - name: Call Incidents Edge Function
        run: |
          WINDOW_INPUT="${{ github.event.inputs.window }}"
          if [ -n "$WINDOW_INPUT" ]; then
            WINDOW="$WINDOW_INPUT"
          else
            WINDOW="all"
          fi

          curl -sS -X POST "${{ secrets.INCIDENTS_PUSH_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -d "{\"trigger\":\"scheduler\",\"window\":\"$WINDOW\"}"
