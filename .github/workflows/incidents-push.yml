name: Incidents Push

on:
  schedule:
    # Ziel-Ticks statt 30-Minuten-Dauerlauf. GitHub Actions cron ist UTC;
    # die Edge Function entscheidet weiterhin fachlich in Europe/Vienna.
    # Die Stunden decken CET und CEST fuer die relevanten MIDAS-Schwellen ab:
    # 10:00, 12:00, 14:00, 16:00, 20:00, 22:00 lokal.
    - cron: "5 8,9,10,11,12,13,14,15,18,19,20,21 * * *"
    # Nachtmedikation: 22:30 und 23:30 lokal, ebenfalls CET/CEST-abgedeckt.
    - cron: "35 20,21,22 * * *"
    # Spaeter Backup-Tick fuer den 23:30-Incident, falls GitHub den :35-Lauf verzoegert.
    - cron: "50 21,22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Manual run mode"
        required: false
        default: "incidents"
        type: choice
        options:
          - incidents
          - diagnostic
      window:
        description: "Manual test window"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - med
          - bp

jobs:
  incidents-push:
    runs-on: ubuntu-latest
    steps:
      - name: Call Incidents Edge Function
        run: |
          set -euo pipefail

          MODE_INPUT="${{ github.event.inputs.mode || 'incidents' }}"
          WINDOW_INPUT="${{ github.event.inputs.window || 'all' }}"
          TRIGGER="scheduler"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRIGGER="manual"
          fi

          if [ "$MODE_INPUT" = "diagnostic" ]; then
            MODE="diagnostic"
          else
            MODE="incidents"
          fi

          if [ -n "$WINDOW_INPUT" ]; then
            WINDOW="$WINDOW_INPUT"
          else
            WINDOW="all"
          fi

          curl --fail-with-body -sS -X POST "${{ secrets.INCIDENTS_PUSH_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -d "{\"trigger\":\"$TRIGGER\",\"mode\":\"$MODE\",\"window\":\"$WINDOW\"}"
